<aside class="sidebar bg-dark text-white p-3">
  <ul class="nav nav-pills flex-column gap-1">
    @for (link of (links$ | async); track link.path) {
      <li class="nav-item">
        <a class="nav-link text-white" [routerLink]="link.path" routerLinkActive="active bg-primary">
          {{ link.label }}
        </a>
      </li>
    }
  </ul>
</aside>
