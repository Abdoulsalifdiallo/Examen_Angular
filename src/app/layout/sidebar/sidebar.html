<aside class="sidebar">
  <ul class="nav flex-column gap-1">
    @for (link of (links$ | async); track link.path) {
      <li class="nav-item">
        <a class="sidebar-link" [routerLink]="link.path" routerLinkActive="active">
          <i class="bi {{ link.icon }}"></i>
          <span>{{ link.label }}</span>
        </a>
      </li>
    }
  </ul>
</aside>
