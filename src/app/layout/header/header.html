<nav class="app-header">
  <div class="brand">
    <span class="brand-mark"><i class="bi bi-wallet2"></i></span>
    <span class="brand-name">BadWallet</span>
  </div>

  @if (session$ | async; as session) {
    <div class="ms-auto d-flex align-items-center gap-3">
      @if (session.role === 'client') {
        <div class="balance-pill">
          <i class="bi bi-cash-coin"></i>
          <span>{{ balance$ | async | xof }}</span>
        </div>
      }
      <div class="user-chip">
        <span class="user-avatar">{{ session.fullName.charAt(0).toUpperCase() }}</span>
        <div class="user-meta">
          <span class="user-name">{{ session.fullName }}</span>
          <span class="user-role">{{ session.role === 'agent' ? 'Agent' : 'Client' }}</span>
        </div>
      </div>
      <button class="btn btn-outline-secondary btn-sm" (click)="logout()">
        <i class="bi bi-box-arrow-right"></i> Déconnexion
      </button>
    </div>
  }
</nav>
