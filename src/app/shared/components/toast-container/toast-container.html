<div class="toast-stack">
  @for (toast of (toasts$ | async); track toast.id) {
    <div class="alert {{ alertClass(toast.kind) }} d-flex align-items-center gap-2 shadow" role="alert">
      <i class="bi {{ toastIcon(toast.kind) }}"></i>
      <span class="flex-grow-1">{{ toast.message }}</span>
      <button type="button" class="btn-close" aria-label="Fermer" (click)="dismiss(toast.id)"></button>
    </div>
  }
</div>
