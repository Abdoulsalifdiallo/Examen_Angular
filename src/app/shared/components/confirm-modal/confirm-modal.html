@if (show) {
  <div class="modal-backdrop-custom" (click)="cancelled.emit()"></div>
  <div class="modal d-block" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">{{ title }}</h5>
          <button type="button" class="btn-close" aria-label="Fermer" (click)="cancelled.emit()"></button>
        </div>
        <div class="modal-body">
          <p>{{ message }}</p>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" (click)="cancelled.emit()">Annuler</button>
          <button type="button" class="btn btn-primary" (click)="confirmed.emit()">Confirmer</button>
        </div>
      </div>
    </div>
  </div>
}
